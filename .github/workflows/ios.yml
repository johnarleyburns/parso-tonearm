name: iOS Build & TestFlight

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE
          xcodebuild -version

      - name: Accept Xcode License
        run: sudo xcodebuild -license accept

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: StoreKit import boundary guard
        run: |
          set -eo pipefail
          # `import StoreKit` is permitted ONLY under Sources/Pro/ and the paywall
          # view. Any other occurrence in Sources/ leaks the StoreKit dependency
          # past the Pro boundary (Ground rule #2) and fails the build.
          LEAKS=$(grep -rln "import StoreKit" Sources \
            | grep -v "^Sources/Pro/" \
            | grep -v "^Sources/Features/Settings/ProPaywallView.swift" \
            || true)
          if [ -n "$LEAKS" ]; then
            echo "StoreKit import leaked outside Sources/Pro/ and the paywall:"
            echo "$LEAKS"
            exit 1
          fi
          echo "StoreKit import boundary OK"

      - name: Product name guard
        run: |
          set -eo pipefail
          LEGACY_NAME="Platter""head"
          LOSER=$(grep -RIn "$LEGACY_NAME" \
            Sources Tests UITests Resources project.yml README.md scripts TONEARM-requirements-design-v2.md TONEARM-audit-fixes-v2.1.md docs/opus-pro-unlock .github \
            | grep -v "PROVISIONING_PROFILE_SPECIFIER" \
            || true)
          if [ -n "$LOSER" ]; then
            echo "Legacy product name found:"
            echo "$LOSER"
            exit 1
          fi
          echo "Product name guard OK"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: spm-${{ hashFiles('project.yml') }}
          restore-keys: spm-

      - name: Run Unit Tests
        run: |
          set -eo pipefail
          xcodebuild test \
            -project Tonearm.xcodeproj \
            -scheme Tonearm \
            -only-testing:TonearmTests \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -parallel-testing-enabled YES \
            2>&1 | tee test.log
          if ! grep -q "TEST SUCCEEDED" test.log; then
            echo "Unit tests failed"
            grep -E "Test.*failed|error:" test.log | head -20
            exit 1
          fi

      - name: Upload Test Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test.log
          retention-days: 7

  testflight-build:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - name: Check TestFlight Signing Configuration
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_PROVISIONING_PROFILE_BASE64 }}
          LEGACY_PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          WIDGETS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.WIDGETS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -eo pipefail
          missing=()

          require_secret() {
            if [ -z "${!1}" ]; then
              missing+=("$2")
            fi
          }

          require_secret APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_BASE64
          require_secret APPLE_CERTIFICATE_PASSWORD APPLE_CERTIFICATE_PASSWORD
          require_secret KEYCHAIN_PASSWORD KEYCHAIN_PASSWORD
          require_secret APPSTORE_API_KEY_ID APPSTORE_API_KEY_ID
          require_secret APPSTORE_API_PRIVATE_KEY APPSTORE_API_PRIVATE_KEY
          require_secret APPSTORE_API_ISSUER_ID APPSTORE_API_ISSUER_ID
          require_secret TEAM_ID TEAM_ID
          require_secret SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64 SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64
          require_secret WIDGETS_EXTENSION_PROVISIONING_PROFILE_BASE64 WIDGETS_EXTENSION_PROVISIONING_PROFILE_BASE64

          if [ -z "$APP_PROVISIONING_PROFILE_BASE64$LEGACY_PROVISIONING_PROFILE_BASE64" ]; then
            missing+=("APP_PROVISIONING_PROFILE_BASE64 or legacy PROVISIONING_PROFILE_BASE64")
          fi

          if [ ${#missing[@]} -gt 0 ]; then
            echo "HAS_TESTFLIGHT_SECRETS=false" >> "$GITHUB_ENV"
            printf -v joined '%s, ' "${missing[@]}"
            echo "::notice::Skipping TestFlight archive; missing signing/upload secrets: ${joined%, }"
          else
            echo "HAS_TESTFLIGHT_SECRETS=true" >> "$GITHUB_ENV"
            echo "TestFlight signing configuration is complete"
          fi

      - name: Checkout
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select latest Xcode
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        run: |
          XCODE=$(ls /Applications/ | grep "^Xcode_" | sort -V | tail -1)
          sudo xcode-select -s /Applications/$XCODE
          xcodebuild -version

      - name: Accept Xcode License
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        run: sudo xcodebuild -license accept

      - name: Install XcodeGen
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        run: brew install xcodegen

      - name: Generate Xcode project
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        run: xcodegen generate

      - name: Import Distribution Certificate
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -eo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o certificate.p12
          security import certificate.p12 \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k build.keychain
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Write App Store Connect API Key
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_PRIVATE_KEY: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
        run: |
          set -eo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_PRIVATE_KEY" \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8

      - name: Cache SPM
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        uses: actions/cache@v4
        with:
          path: |
            ~/.swiftpm
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
          key: spm-${{ hashFiles('project.yml') }}
          restore-keys: spm-

      - name: Compute Version
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        run: |
          set -eo pipefail
          BUILD=$(git rev-list --count HEAD)
          echo "BUILD_NUMBER=$BUILD" >> "$GITHUB_ENV"
          echo "MKT_VERSION=0.1.$BUILD" >> "$GITHUB_ENV"
          echo "Marketing version: 0.1.$BUILD (build $BUILD)"

      - name: Import Provisioning Profile
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        env:
          APP_PROVISIONING_PROFILE_BASE64: ${{ secrets.APP_PROVISIONING_PROFILE_BASE64 }}
          LEGACY_PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
          WIDGETS_EXTENSION_PROVISIONING_PROFILE_BASE64: ${{ secrets.WIDGETS_EXTENSION_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          APP_PROFILE="${APP_PROVISIONING_PROFILE_BASE64:-$LEGACY_PROVISIONING_PROFILE_BASE64}"
          printf '%s' "$APP_PROFILE" | base64 --decode \
            -o "$HOME/Library/MobileDevice/Provisioning Profiles/Parso_Tonearm_App_Store.mobileprovision"
          printf '%s' "$SHARE_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            -o "$HOME/Library/MobileDevice/Provisioning Profiles/Parso_Tonearm_Share_Extension.mobileprovision"
          printf '%s' "$WIDGETS_EXTENSION_PROVISIONING_PROFILE_BASE64" | base64 --decode \
            -o "$HOME/Library/MobileDevice/Provisioning Profiles/Parso_Tonearm_Widgets_Extension.mobileprovision"

      - name: Archive
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -eo pipefail
          xcodebuild archive \
            -project Tonearm.xcodeproj \
            -scheme Tonearm \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath ./build/Tonearm.xcarchive \
            ARCHS=arm64 \
            MARKETING_VERSION="$MKT_VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            IPHONEOS_DEPLOYMENT_TARGET=18.0 \
            "DEVELOPMENT_TEAM=$TEAM_ID" \
            2>&1 | tee build.log
          if [ ! -d "./build/Tonearm.xcarchive" ]; then
            echo "Archive not found — build failed"
            grep -E 'error:' build.log | head -20
            exit 1
          fi

      - name: Export IPA
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        run: |
          set -eo pipefail
          xcodebuild -exportArchive \
            -archivePath ./build/Tonearm.xcarchive \
            -exportPath ./output \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        if: env.HAS_TESTFLIGHT_SECRETS == 'true'
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
        run: |
          set -eo pipefail
          xcrun altool --upload-app \
            --type ios \
            --file output/Tonearm.ipa \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"

      - name: Upload Build Log on Failure
        if: failure() && env.HAS_TESTFLIGHT_SECRETS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
          retention-days: 7

      - name: Cleanup
        if: always() && env.HAS_TESTFLIGHT_SECRETS == 'true'
        run: |
          security delete-keychain build.keychain || true
          rm -f ~/.appstoreconnect/private_keys/AuthKey_*.p8
