name: Tonearm
options:
  bundleIdPrefix: guru.parso
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  TonearmCore:
    path: .

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "3264Y8YUGV"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "NO"
    TONEARM_DROPBOX_CLIENT_ID: ""
    TONEARM_GOOGLE_DRIVE_CLIENT_ID: ""
    TONEARM_ONEDRIVE_CLIENT_ID: ""
    TONEARM_PCLOUD_CLIENT_ID: ""
    TONEARM_PCLOUD_CLIENT_SECRET: ""

targets:
  Tonearm:
    type: application
    platform: iOS
    sources:
      - path: Sources
        excludes:
          - "Art/**"
          - "Audio/**"
          - "Data/**"
          - "Domain/**"
          - "IA/**"
          - "Intents/**"
          - "Pro/**"
          - "Remote/**"
          - "Share/**"
          - "Snapshot/**"
          - "Sync/**"
      - path: Resources
    dependencies:
      - package: TonearmCore
      - target: TonearmShareExtension
        embed: true
      - target: TonearmWidgetsExtension
        embed: true
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Tonearm
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleURLTypes:
          - CFBundleURLName: guru.parso.tonearm
            CFBundleURLSchemes:
              - tonearm
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            archive.org:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
            itunes.apple.com:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
            mzstatic.com:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
        ITSAppUsesNonExemptEncryption: false
        TonearmOAuthClientIDs:
          dropbox: "$(TONEARM_DROPBOX_CLIENT_ID)"
          googleDrive: "$(TONEARM_GOOGLE_DRIVE_CLIENT_ID)"
          oneDrive: "$(TONEARM_ONEDRIVE_CLIENT_ID)"
          pCloud: "$(TONEARM_PCLOUD_CLIENT_ID)"
        TonearmOAuthClientSecrets:
          pCloud: "$(TONEARM_PCLOUD_CLIENT_SECRET)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.tonearm
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "3264Y8YUGV"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_ENTITLEMENTS: Sources/App/Tonearm.Debug.entitlements
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Platterhead Profile"
          CODE_SIGN_ENTITLEMENTS: Sources/App/Tonearm.entitlements

  TonearmShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    dependencies:
      - package: TonearmCore
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Add to Tonearm
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.tonearm.share
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: "3264Y8YUGV"
        APPLICATION_EXTENSION_API_ONLY: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Platterhead Share Extension Profile"

  TonearmWidgetsExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: WidgetsExtension
      - path: Sources/Widgets
    dependencies:
      - package: TonearmCore
    info:
      path: WidgetsExtension/Info.plist
      properties:
        CFBundleDisplayName: Tonearm Widgets
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.tonearm.widgets
        TARGETED_DEVICE_FAMILY: "1,2"
        DEVELOPMENT_TEAM: "3264Y8YUGV"
        APPLICATION_EXTENSION_API_ONLY: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
        CODE_SIGN_ENTITLEMENTS: WidgetsExtension/TonearmWidgets.entitlements
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Platterhead Widgets Profile"

  TonearmUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Tonearm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.tonearm.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Tonearm

schemes:
  Tonearm:
    build:
      targets:
        Tonearm: all
        TonearmShareExtension: all
        TonearmWidgetsExtension: all
        TonearmUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Resources/Tonearm.storekit
    test:
      config: Debug
      storeKitConfiguration: Resources/Tonearm.storekit
      targets:
        - TonearmUITests
      gatherCoverageData: false
