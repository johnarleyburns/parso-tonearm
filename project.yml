name: Tonearm
options:
  bundleIdPrefix: guru.parso
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: "3264Y8YUGV"
    IPHONEOS_DEPLOYMENT_TARGET: "18.0"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    GENERATE_INFOPLIST_FILE: "NO"

targets:
  Tonearm:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: GRDB
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: Tonearm
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSExceptionDomains:
            archive.org:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
            itunes.apple.com:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
            mzstatic.com:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: false
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.tonearm
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        DEVELOPMENT_TEAM: "3264Y8YUGV"
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_ENTITLEMENTS: Sources/App/Tonearm.Debug.entitlements
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "Parso Tonearm App Store"
          CODE_SIGN_ENTITLEMENTS: Sources/App/Tonearm.entitlements

  TonearmTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
        excludes:
          - "Fixtures/**"
      - path: Tests/Fixtures
        type: folder
        buildPhase: resources
    dependencies:
      - target: Tonearm
      - package: GRDB
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.tonearm.tests
        GENERATE_INFOPLIST_FILE: "YES"

  TonearmUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: Tonearm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: guru.parso.tonearm.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Tonearm

schemes:
  Tonearm:
    build:
      targets:
        Tonearm: all
        TonearmTests: [test]
        TonearmUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Resources/Tonearm.storekit
    test:
      config: Debug
      storeKitConfiguration: Resources/Tonearm.storekit
      targets:
        - TonearmTests
        - TonearmUITests
      gatherCoverageData: false
